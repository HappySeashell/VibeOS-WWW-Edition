        /**
         * 模块 12: 全局 AI 任务调度中心 (Global Task Scheduler)
         * 职责：文本与图片双通道并发控制、任务优先级抢占、DOM 生命周期嗅探
         */
        const TASK_PRIORITY = {
            URGENT: 0,      // 用户直接触发的 UI 交互演算、应用启动（最高优先级）
            NORMAL: 5,      // 普通流转任务（如加载普通图片）
            BACKGROUND: 10  // 后台静默任务（如长期记忆提炼，插空进行）
        };

        const AIScheduler = {
            taskIdCounter: 0,
            textQueue: [],
            imageQueue: [],
            isTextProcessing: false,
            isImageProcessing: false,

            // --- 文本模型通道 (绝对串行) ---
            enqueueText(taskFn, priority = TASK_PRIORITY.NORMAL) {
                this.textQueue.push({ id: this.taskIdCounter++, fn: taskFn, priority });
                this.textQueue.sort((a, b) => a.priority === b.priority ? a.id - b.id : a.priority - b.priority);
                this._processText();
            },

            async _processText() {
                if (this.isTextProcessing) return;
                this.isTextProcessing = true;

                while (this.textQueue.length > 0) {
                    const task = this.textQueue.shift();
                    try {
                        await task.fn();
                    } catch (e) {
                        console.error("[Scheduler] 文本任务执行异常:", e);
                    }
                    await new Promise(r => setTimeout(r, 100)); // 喘息时间
                }

                this.isTextProcessing = false;
            },

            // --- 多模态生图通道 (独立串行 + 生命周期嗅探) ---
            enqueueImage(appId, container, imgNode, prompt, priority = TASK_PRIORITY.NORMAL) {
                const existing = this.imageQueue.find(t => t.imgNode === imgNode);
                if (existing) {
                    existing.prompt = prompt;
                    existing.priority = priority;
                    this.imageQueue.sort((a, b) => a.priority === b.priority ? a.id - b.id : a.priority - b.priority);
                    return;
                }

                this.imageQueue.push({
                    id: this.taskIdCounter++,
                    appId, container, imgNode, prompt, priority,
                    abortController: (typeof AbortController !== 'undefined') ? new AbortController() : null
                });
                this.imageQueue.sort((a, b) => a.priority === b.priority ? a.id - b.id : a.priority - b.priority);
                this._processImage();
            },

            async _processImage() {
                if (this.isImageProcessing) return;
                this.isImageProcessing = true;

                while (this.imageQueue.length > 0) {
                    const task = this.imageQueue.shift();

                    if (!task.imgNode.isConnected) {
                        console.log(`[Scheduler] 节点已销毁，取消生成: ${task.prompt}`);
                        continue;
                    }

                    try {
                        const signal = task.abortController ? task.abortController.signal : null;
                        const blob = await ImageService.generate(task.prompt, signal);

                        const objectUrl = typeof blob === 'string' ? blob : URL.createObjectURL(blob);

                        if (task.imgNode.isConnected) {
                            task.imgNode.src = objectUrl;
                            task.imgNode.alt = `[已生成的图像: ${task.prompt}]`;
                            task.imgNode.classList.remove('cursor-pointer');

                            // 存入异步瞬态缓存，必须严格绑定 ID + Prompt
                            if (typeof blob !== 'string' && task.imgNode.id) {
                                const cacheKey = Utils.hashPrompt(task.imgNode.id + '|' + task.prompt);
                                await StorageManager.BlobCache.put(cacheKey, blob);
                            }

                            // 存入上下文时净化 HTML，去掉 src 里的 Blob URL，防止撑爆 LocalStorage
                            ContextStore.updateSnapshot(task.appId, Utils.getPurifiedHTML(task.container));
                        }
                    } catch (e) {
                        if (e.name === 'AbortError') continue;

                        if (task.imgNode.isConnected) {
                            task.imgNode.src = ImageService._createFallbackSVG(`生成失败: ${e.message}`);
                            task.imgNode.alt = `[生成失败: ${task.prompt}]`;
                            task.imgNode.setAttribute('data-failed-prompt', task.prompt);
                            task.imgNode.removeAttribute('data-prompt');
                            task.imgNode.classList.add('cursor-pointer');

                            // 失败状态同样需要净化 HTML
                            ContextStore.updateSnapshot(task.appId, Utils.getPurifiedHTML(task.container));
                        }
                    }

                    // 智能动态冷却：防 429
                    await new Promise(r => setTimeout(r, 1500));
                }

                this.isImageProcessing = false;
            },

            clearImagesForApp(appId) {
                const toCancel = this.imageQueue.filter(t => t.appId === appId);
                toCancel.forEach(t => { if (t.abortController) t.abortController.abort(); });
                this.imageQueue = this.imageQueue.filter(t => t.appId !== appId);
            }
        };

        /**
         * 模块 10: 核心调度器 (App Controller)
         */
        const AppController = {
            async dispatchIntent(appId, container, actionSequence) {
                const domSnapshot = Utils.getPurifiedHTML(container);
                WindowManager.showLoading(appId);

                const sysPrompt = PromptBuilder.buildSystemPrompt(appId);
                const userPrompt = PromptBuilder.buildUserPrompt(domSnapshot, actionSequence);
                const onChunk = Config.LLM.useStreaming ? (delta, fullText) => { } : null;

                AIScheduler.enqueueText(() => {
                    return new Promise((resolve) => {
                        APIGateway.callModel(sysPrompt, userPrompt, onChunk,
                            (finalHTML) => {
                                WindowManager.hideLoading(appId);

                                const applied = DOMPatcher.applyPatch(container, finalHTML, {
                                    onBeforeMount: (newNode) => {
                                        const imagesToPatch = newNode.tagName === 'IMG' ? [newNode] : newNode.querySelectorAll('img[data-prompt]');
                                        for (const img of imagesToPatch) {
                                            if (img.hasAttribute('data-prompt')) {
                                                img.src = ImageService._createFallbackSVG('准备排队...');
                                            }
                                        }
                                    }
                                });

                                if (applied) {
                                    ContextStore.saveSession(appId, Utils.getPurifiedHTML(container), actionSequence, finalHTML);
                                    MemoryManager.checkAndSummarizeMemory(appId, actionSequence, finalHTML);

                                    UIManager.handleImageHydration(appId, container);
                                }
                                resolve();
                            },
                            (err) => {
                                WindowManager.hideLoading(appId);
                                NotificationCenter.show({ title: 'API 错误', message: err, type: 'error', duration: 8000 });
                                resolve();
                            }
                        );
                    });
                }, TASK_PRIORITY.URGENT);
            }
        };

        /**
         * 模块 9: 事件委托与行为缓冲池 (Event Delegator)
         */
        const EventDelegator = {
            actionBuffers: {},

            init() {
                const osContainer = document.getElementById('os-container');
                osContainer.addEventListener('input', (e) => this.handlePassiveAction(e, 'input'));
                osContainer.addEventListener('change', (e) => this.handlePassiveAction(e, 'change'));
                osContainer.addEventListener('focusin', (e) => this.handlePassiveAction(e, 'focus'));
                osContainer.addEventListener('click', (e) => this.handleActiveAction(e, 'click'));
                osContainer.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && e.target.tagName === 'INPUT' && !['button', 'checkbox', 'radio'].includes(e.target.type)) {
                        this.handleActiveAction(e, 'submit_enter');
                    }
                });
            },

            _getAppId(target) {
                const appWindow = target.closest('.window');
                if (!appWindow) return null;
                const appId = appWindow.id.replace('win-', '');

                // 动态检查 Config 中是否为原生系统应用，彻底消灭硬编码
                if (Config.System.systemApps[appId]) return null;
                // 预留注册表扩展判断：如果是未来通过 ContextStore 注册的原生应用也豁免
                if (ContextStore.registry[appId]?.type === 'SYSTEM') return null;

                return appId;
            },

            _isDialogCancel(control) {
                const action = (control.getAttribute('data-dialog-action') || '').toLowerCase();
                const text = (control.innerText || control.value || '').trim().toLowerCase();
                return action === 'cancel' || ['取消', '关闭', 'close', 'cancel', 'x', '×'].includes(text);
            },

            _closeAppDialog(dialog) {
                if (!dialog) return;
                if (dialog.open) {
                    try { dialog.close(); } catch (e) { dialog.removeAttribute('open'); }
                }
                dialog.remove();
            },

            handlePassiveAction(e, type) {
                if (e.target.closest('#modal-container')) return; // 物理隔离防火墙
                if (!e.target.closest('.window-content')) return;

                const target = e.target.closest('[id]');
                if (!target || target.id.startsWith('wm-') || target.id.startsWith('win-')) return;
                const appId = this._getAppId(target);
                if (!appId) return;

                if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT') {
                    if (target.type === 'checkbox' || target.type === 'radio') {
                        target.toggleAttribute('checked', target.checked);
                    } else {
                        target.setAttribute('value', target.value);
                    }
                }

                if (!this.actionBuffers[appId]) this.actionBuffers[appId] = [];
                const log = { type: type, targetId: target.id };
                if (['input', 'change'].includes(type)) {
                    log.value = target.type === 'checkbox' ? target.checked : target.value;
                }
                this.actionBuffers[appId].push(log);
            },

            handleActiveAction(e, type) {
                if (e.target.closest('#modal-container')) return; // 物理隔离防火墙
                if (!e.target.closest('.window-content')) return;
                if (e.target.closest('.global-loading-overlay')) return;

                const failedImg = e.target.closest('img[data-failed-prompt]');
                if (failedImg) {
                    const prompt = failedImg.getAttribute('data-failed-prompt');
                    failedImg.setAttribute('data-prompt', prompt);
                    failedImg.removeAttribute('data-failed-prompt');
                    failedImg.classList.remove('cursor-pointer');
                    failedImg.src = ImageService._createFallbackSVG('准备重试...');

                    const appId = this._getAppId(failedImg);
                    const contentContainer = appId ? document.getElementById(`content-${appId}`) : null;
                    if (appId && contentContainer) {
                        UIManager.handleImageHydration(appId, contentContainer);
                    }
                    return;
                }

                const appDialog = e.target.closest('.window-content dialog');
                const dialogControl = appDialog ? e.target.closest('button, [role="button"], .dialog-close, [data-dialog-action]') : null;
                if (appDialog && type === 'click' && dialogControl && this._isDialogCancel(dialogControl)) {
                    const appId = this._getAppId(appDialog);
                    if (appId) this.actionBuffers[appId] = [];
                    this._closeAppDialog(appDialog);
                    return;
                }

                const target = e.target.closest('[id]');
                if (!target || target.id.startsWith('wm-') || target.id.startsWith('win-') || target.id.startsWith('content-')) {
                    if (e.target.closest('button, input, select, textarea, a, tool-row, [role="button"]')) {
                        NotificationCenter.show({ title: '交互失败', message: '该控件缺少可交互 ID，请重试。', type: 'warning' });
                    }
                    return;
                }

                if (type === 'click') {
                    const tagName = target.tagName.toUpperCase();
                    if ((tagName === 'INPUT' && !['button', 'checkbox', 'radio', 'submit'].includes(target.type)) || tagName === 'TEXTAREA' || tagName === 'SELECT') return;
                }

                const appId = this._getAppId(target);
                const contentContainer = appId ? document.getElementById(`content-${appId}`) : null;
                if (!appId || !contentContainer) return;

                if (!this.actionBuffers[appId]) this.actionBuffers[appId] = [];
                this.actionBuffers[appId].push({ type: type, targetId: target.id });

                const actionSequence = [...this.actionBuffers[appId]];
                this.actionBuffers[appId] = [];

                AppController.dispatchIntent(appId, contentContainer, actionSequence);
                if (appDialog && dialogControl) this._closeAppDialog(appDialog);
            }
        };

        /**
         * 模块 10: 窗口管理器 (Window Manager)
         */
        const WindowManager = {
            zIndex: 100,
            createWindow(appId, title, contentHTML, icon = '💿') {
                const winId = `win-${appId}`;
                if (document.getElementById(winId)) { this.toggleMinimize(winId, true); return; }

                // 1. 克隆模板骨架
                const template = document.getElementById('tpl-os-window');
                if (!template) return;
                const clone = template.content.cloneNode(true);
                const win = clone.querySelector('.window');

                // 2. 注入动态属性与内容
                win.id = winId;
                win.style.left = `${Math.random() * 50 + 20}px`;
                win.style.top = `${Math.random() * 50 + 20}px`;
                win.style.zIndex = ++this.zIndex;

                win.querySelector('.window-title').innerHTML = `${icon} ${title}`;

                const contentDiv = win.querySelector('.window-content');
                contentDiv.id = `content-${appId}`;
                contentDiv.innerHTML = contentHTML;

                // 3. 安全挂载闭包事件 (替代被淘汰的 inline onclick)
                win.querySelector('.window-header').addEventListener('mousedown', (e) => this.startDrag(e, win));
                win.querySelector('.btn-min').addEventListener('click', () => this.toggleMinimize(winId));
                win.querySelector('.btn-max').addEventListener('click', () => this.toggleMaximize(winId));
                win.querySelector('.btn-close').addEventListener('click', () => this.closeWindow(winId));
                win.addEventListener('mousedown', () => this.bringToFront(win));

                // 4. 上树
                document.getElementById('os-container').appendChild(clone);
                ComponentRuntime.init(contentDiv);

                const taskbarApps = document.getElementById('taskbar-apps');
                const tab = document.createElement('div');
                tab.className = 'taskbar-item active'; tab.id = `tab-${winId}`;
                tab.innerText = `${icon} ${title}`;
                tab.onclick = () => this.toggleMinimize(winId);
                taskbarApps.appendChild(tab);

                this.bringToFront(win);
            },
            closeWindow(winId) {
                const win = document.getElementById(winId);
                if (win) {
                    win.remove();
                    const tab = document.getElementById(`tab-${winId}`);
                    if (tab) tab.remove();
                    const appId = winId.replace('win-', '');
                    if (EventDelegator.actionBuffers[appId]) delete EventDelegator.actionBuffers[appId];
                    AIScheduler.clearImagesForApp(appId);
                }
            },
            toggleMinimize(winId, forceShow = false) {
                const win = document.getElementById(winId);
                const tab = document.getElementById(`tab-${winId}`);
                if (!win) return;
                if (win.style.display === 'none' || forceShow) {
                    win.style.display = 'flex'; this.bringToFront(win);
                } else {
                    if (win.style.zIndex == this.zIndex) {
                        win.style.display = 'none'; if (tab) tab.classList.remove('active');
                    } else {
                        this.bringToFront(win);
                    }
                }
            },
            toggleMaximize(winId) {
                const win = document.getElementById(winId);
                if (win) win.classList.toggle('maximized');
            },
            bringToFront(win) {
                win.style.zIndex = ++this.zIndex;
                document.querySelectorAll('.taskbar-item').forEach(el => el.classList.remove('active'));
                const tab = document.getElementById(`tab-${win.id}`);
                if (tab) tab.classList.add('active');
            },
            startDrag(e, win) {
                if (win.classList.contains('maximized')) return;
                const parentRect = win.offsetParent.getBoundingClientRect();
                const winRect = win.getBoundingClientRect();
                const offsetX = e.clientX - winRect.left;
                const offsetY = e.clientY - winRect.top;

                const move = (e) => {
                    win.style.left = `${e.clientX - parentRect.left - offsetX}px`;
                    win.style.top = `${e.clientY - parentRect.top - offsetY}px`;
                };
                const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
                document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
            },
            showLoading(appId) {
                // 【修复】根绝幽灵状态：将加载动画挂载在外壳窗口本身，绝对不污染 content.innerHTML
                const win = document.getElementById(`win-${appId}`);
                if (win && !win.querySelector('.global-loading-overlay')) {
                    const overlay = document.createElement('div');
                    overlay.className = 'global-loading-overlay';
                    overlay.id = `loading-${appId}`;
                    overlay.innerText = 'VibeOS 正在生成 UI...';
                    win.appendChild(overlay);
                }
            },
            hideLoading(appId) {
                const loading = document.getElementById(`loading-${appId}`);
                if (loading) loading.remove();
            }
        };

        /**
         * 模块 11: 全局通知系统 (Notification Center)
         */
        const NotificationCenter = {
            show({ title, message, type = 'info', duration = 4000 }) {
                const container = document.getElementById('notification-container');
                if (!container) return;

                const notify = document.createElement('div');
                notify.className = `notification`;

                const icons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '❌' };
                const icon = icons[type] || icons.info;

                notify.innerHTML = `
                    <div class="notify-header">
                        <span>${icon} ${title}</span>
                        <span class="notify-close" title="关闭">×</span>
                    </div>
                    <div class="notify-body">${message}</div>
                `;

                container.appendChild(notify);

                let timeoutId;
                const closeNotify = () => {
                    notify.classList.add('notify-fade-out');
                    setTimeout(() => notify.remove(), 200);
                };

                notify.querySelector('.notify-close').onclick = closeNotify;

                const startTimer = () => {
                    if (duration > 0) timeoutId = setTimeout(closeNotify, duration);
                };
                const stopTimer = () => clearTimeout(timeoutId);

                notify.onmouseenter = stopTimer;
                notify.onmouseleave = startTimer;

                startTimer();
            }
        };

        /**
                 * 模块 12: 全局模态弹窗管理器 (Modal Manager)
                 */
        const ModalManager = {
            openModal({ title, bodyHtml, buttons }) {
                const container = document.getElementById('modal-container');
                if (!container) return;

                let btnHtml = buttons.map((b, i) => `<button id="modal-btn-${i}" class="btn ${b.type || ''}">${b.text}</button>`).join('');

                container.innerHTML = `
                    <dialog data-dialog-scope="system">
                        <div class="dialog-header">
                            <span>${title}</span>
                            <span class="dialog-close" id="modal-close-x">X</span>
                        </div>
                        <div class="dialog-body">${bodyHtml}</div>
                        <div class="dialog-footer">${btnHtml}</div>
                    </dialog>
                `;

                const dialog = container.querySelector('dialog');
                document.getElementById('modal-close-x').onclick = () => this.closeModal();
                buttons.forEach((b, i) => {
                    document.getElementById(`modal-btn-${i}`).onclick = () => {
                        if (b.onClick) b.onClick(container);
                    };
                });

                if (dialog) {
                    try {
                        dialog.showModal();
                    } catch (e) {
                        dialog.setAttribute('open', '');
                    }
                }
            },

            closeModal() {
                const container = document.getElementById('modal-container');
                if (!container) return;
                container.querySelectorAll('dialog').forEach(dialog => {
                    if (dialog.open) {
                        try { dialog.close(); } catch (e) { dialog.removeAttribute('open'); }
                    }
                });
                container.innerHTML = '';
            },

            confirm(title, message) {
                return new Promise(resolve => {
                    this.openModal({
                        title: title,
                        bodyHtml: `<div>${message}</div>`,
                        buttons: [
                            { text: '取消', onClick: () => { this.closeModal(); resolve(false); } },
                            { text: '确定', type: 'btn-primary', onClick: () => { this.closeModal(); resolve(true); } }
                        ]
                    });
                });
            },

            prompt(title, message, defaultValue = '') {
                return new Promise(resolve => {
                    this.openModal({
                        title: title,
                        bodyHtml: `
                            <div class="flex-col">
                                <div>${message}</div>
                                <input type="text" id="modal-prompt-input" class="input" value="${defaultValue}">
                            </div>
                        `,
                        buttons: [
                            { text: '取消', onClick: () => { this.closeModal(); resolve(null); } },
                            {
                                text: '确定', type: 'btn-primary', onClick: () => {
                                    const val = document.getElementById('modal-prompt-input').value;
                                    this.closeModal();
                                    resolve(val);
                                }
                            }
                        ]
                    });

                    setTimeout(() => {
                        const input = document.getElementById('modal-prompt-input');
                        if (input) { input.focus(); input.select(); }
                    }, 50);
                });
            }
        };

        /**
         * 模块 14: 应用冷启动与外壳路由 (App Router)
         */
        const AppRouter = {
            launchApp(appId) {
                toggleStartMenu(false);

                const sysApp = Config.System.systemApps[appId];
                if (sysApp) {
                    const tpl = document.getElementById(sysApp.templateId).innerHTML;
                    WindowManager.createWindow(appId, sysApp.name, tpl, sysApp.icon);
                    if (appId === 'app-settings') UIManager.loadSettingsToUI();
                    return;
                }

                const meta = ContextStore.registry[appId];
                if (!meta) {
                    NotificationCenter.show({ title: '错误', message: 'App 不存在!', type: 'error' });
                    return;
                }

                const session = ContextStore.sessions[appId];
                if (session && session.htmlSnapshot) {
                    WindowManager.createWindow(appId, meta.name, session.htmlSnapshot, meta.icon);
                    // [修复] 冷启动恢复快照后，必须唤醒挂载缓存中的图片
                    const container = document.getElementById(`content-${appId}`);
                    if (container) UIManager.handleImageHydration(appId, container);
                } else {
                    this._coldStartApp(appId, meta);
                }
            },
            _coldStartApp(appId, meta) {
                WindowManager.createWindow(appId, meta.name, `<div id="root-${appId}" class="status-panel">正在为 ${meta.name} 初始化界面...</div>`, meta.icon);

                const sysPrompt = PromptBuilder.buildSystemPrompt(appId);

                AIScheduler.enqueueText(() => {
                    return new Promise((resolve) => {
                        let previewTimer = null;
                        let previewHTML = '';
                        const container = document.getElementById(`content-${appId}`);
                        const onChunk = Config.LLM.useStreaming && container ? (delta, fullText) => {
                            previewHTML = fullText || previewHTML + delta;
                            if (previewTimer) return;
                            previewTimer = setTimeout(() => {
                                previewTimer = null;
                                const liveContainer = document.getElementById(`content-${appId}`);
                                if (liveContainer && previewHTML.trim()) {
                                    liveContainer.innerHTML = previewHTML;
                                }
                            }, 100);
                        } : null;

                        APIGateway.callModel(sysPrompt, "Initialize the first screen.", onChunk,
                            (html) => {
                                if (previewTimer) {
                                    clearTimeout(previewTimer);
                                    previewTimer = null;
                                }
                                const container = document.getElementById(`content-${appId}`);
                                if (container) {
                                    const applied = DOMPatcher.applyPatch(container, html, {
                                        allowFullMount: true,
                                        onBeforeMount: (newNode) => {
                                            const imagesToPatch = newNode.tagName === 'IMG' ? [newNode] : newNode.querySelectorAll('img[data-prompt]');
                                            for (const img of imagesToPatch) {
                                                if (img.hasAttribute('data-prompt')) {
                                                    img.src = ImageService._createFallbackSVG('准备排队...');
                                                }
                                            }
                                        }
                                    });
                                    if (applied) {
                                        // [修复残留] 冷启动快照也必须经过净化，剔除 src，保持 LocalStorage 纯净！
                                        ContextStore.saveSession(appId, Utils.getPurifiedHTML(container), null, null);
                                        UIManager.handleImageHydration(appId, container);
                                    }
                                }
                                resolve();
                            },
                            (err) => {
                                if (previewTimer) {
                                    clearTimeout(previewTimer);
                                    previewTimer = null;
                                }
                                NotificationCenter.show({ title: '应用初始化失败', message: err, type: 'error', duration: 8000 });
                                resolve();
                            }
                        );
                    });
                }, TASK_PRIORITY.URGENT);
            }
        };


        /**
         * 全局 Helper 函数
         */
        function toggleStartMenu(force) {
            const menu = document.getElementById('start-menu');
            if (force === false) { menu.style.display = 'none'; return; }
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        window.switchSettingsTab = (tabId) => {
            document.querySelectorAll('#settings-tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.settings-pane').forEach(p => p.classList.remove('active'));
            const tabBtn = document.getElementById(`tab-btn-${tabId}`);
            const pane = document.getElementById(`pane-${tabId}`);
            if (tabBtn) tabBtn.classList.add('active');
            if (pane) pane.classList.add('active');
        };

        function saveSettings(isAuto = false) {
            Config.UIBindings.forEach(bind => {
                const el = document.getElementById(bind.id);
                if (el) {
                    Config[bind.section][bind.key] = bind.type === 'boolean' ? el.value === "true" : el.value;
                }
            });

            StorageManager.Sync.save('vibe_config', Config);
        }

        async function clearAllCacheAndReset() {
            if (await ModalManager.confirm('恢复出厂设置', "警告：将清除 VibeOS 的所有应用数据，系统将重置为初始状态。是否继续？")) {
                await StorageManager.BlobCache.clearAll();
                StorageManager.Sync.clearData(Config.StorageKeys);
                location.reload();
            }
        }

        function doAppSearch() {
            const query = document.getElementById('app-search-input').value;
            if (!query) return;
            const resContainer = document.getElementById('search-results');
            resContainer.innerHTML = '<div class="status-panel">搜索中...</div>';

            const settingsBlock = SettingsManager.getCombinedSettingString();
            const memoryBlock = MemoryManager.longTermMemory.length > 0 ? `[长期记忆]\n${MemoryManager.longTermMemory.join('\n')}` : '';
            const count = Config.System.searchResultCount || 3;

            const sysPrompt = `${settingsBlock ? settingsBlock + '\n\n' : ''}${memoryBlock ? memoryBlock + '\n\n' : ''}[关键指令]
你是一个操作系统的应用搜索引擎。请根据用户输入的搜索内容，仅返回一个包含 ${count} 个应用的有效 JSON 数组，不要输出任何其他文本。
格式为：[{ "name": "应用名称", "desc": "对于应用功能的一句话描述", "icon": "🌟", "publisher": "发行商名称" }]。

遵守下述规则：
1. 返回的应用应与用户的输入相关性强，应用的名称或描述最好包括或直接就是用户搜索的关键词。
2. 不同应用的功能之间应该存在不影响搜索相关性的差异。从上到下，应用从强相关变成弱相关，但不会毫不相干。
3. icon、publisher应根据应用性质和背景设定智能适配。
4. 使用简体中文。`;

            APIGateway.callModel(sysPrompt, `Query: ${query}`, null,

                (jsonStr) => {
                    try {
                        const cleanJson = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                        const apps = JSON.parse(cleanJson);
                        resContainer.innerHTML = '';
                        apps.forEach(app => {
                            const btn = document.createElement('div');
                            btn.className = 'start-menu-item list-item-bordered';
                            btn.innerHTML = `<div><strong>${app.icon || '💿'} ${app.name}</strong><br><span class="text-muted">${app.desc}<br>发行商: ${app.publisher || '未知'}</span></div>`;
                            btn.onclick = () => {
                                const appId = 'app-' + Utils.generateUUID();
                                ContextStore.registerApp(appId, app.name, app.desc, app.icon, app.publisher, Date.now());
                                AppRouter.launchApp(appId);
                                WindowManager.closeWindow('win-app-search');
                            };
                            resContainer.appendChild(btn);
                        });
                    } catch (e) {
                        resContainer.innerHTML = `<div class="status-panel text-danger">Parse Error. Try again.</div><pre>${jsonStr}</pre>`;
                    }
                },
                (err) => resContainer.innerHTML = `<div class="status-panel text-danger">Error: ${err}</div>`
            );
        }

        window.onload = () => {
            // 1. 加载核心配置
            const savedConfig = StorageManager.Sync.load('vibe_config', null);
            if (savedConfig) {
                // 备份不可变的系统核心级配置，防止被旧版本的本地缓存污染
                const coreSystemApps = Config.System.systemApps;
                const coreTemplates = Config.System.SETTING_TEMPLATES;

                Object.assign(Config.LLM, savedConfig.LLM || {});
                Object.assign(Config.Image, savedConfig.Image || {});
                Object.assign(Config.System, savedConfig.System || {});

                // 恢复核心配置
                Config.System.systemApps = coreSystemApps;
                Config.System.SETTING_TEMPLATES = coreTemplates;
            }
            if (typeof window.generateRaw === 'function' && typeof window.eventOn === 'function') {
                Config.LLM.apiMode = 'SILLYTAVERN';
            }

            // 2. 初始化各子系统
            ThemeManager.init();
            SettingsManager.init();
            MemoryManager.init();

            console.log("VibeOS Booted.");
